<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AnasOS" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>AnasOS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>AnasOS</h1>
        <p>Build Anas V1.0</p>
      </div>
      <button id="installBtn" class="ghost hidden">Install</button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-page="today">اليوم</button>
      <button class="tab" data-page="notes">ملاحظة</button>
      <button class="tab" data-page="history">السجل</button>
      <button class="tab" data-page="export">تصدير</button>
    </nav>

    <main>
      <section id="today" class="page active">
        <div class="card hero">
          <h2>تسجيل اليوم</h2>
          <p id="todayDate"></p>
          <p class="quote">لا تطارد اليوم المثالي. ابنِ يومًا أفضل من أمس بنسبة 1%.</p>
        </div>

        <form id="dailyForm" class="card form">
          <label>التاريخ
            <input type="date" id="date" required />
          </label>

          <div class="grid2">
            <label>وقت النوم
              <input type="time" id="sleepTime" />
            </label>
            <label>وقت الاستيقاظ
              <input type="time" id="wakeTime" />
            </label>
          </div>

          <label>أول جلسة دراسة / عمل تمت؟
            <select id="firstSession">
              <option value="">اختر</option>
              <option value="yes">نعم</option>
              <option value="no">لا</option>
            </select>
          </label>

          <label>ماذا درست أو أنجزت اليوم؟
            <textarea id="studied" rows="3" placeholder="مثال: راجعت الاحتمالات، أو طبقت VLAN..."></textarea>
          </label>

          <label>ماذا أتذكر بدون فتح الكتاب؟
            <textarea id="recall" rows="4" placeholder="اكتب من الذاكرة فقط، حتى لو كان قليلًا."></textarea>
          </label>

          <div class="grid2">
            <label>دقائق السوشيال ميديا
              <input type="number" id="socialMinutes" min="0" placeholder="0" />
            </label>
            <label>تقييم اليوم من 10
              <input type="number" id="score" min="0" max="10" placeholder="7" />
            </label>
          </div>

          <label>وجبة صحية اليوم
            <input type="text" id="healthyMeal" placeholder="مثال: رز ودجاج وسلطة" />
          </label>

          <label>حركة / مشي / رياضة
            <input type="text" id="movement" placeholder="مثال: مشي 15 دقيقة" />
          </label>

          <label>أفضل شيء تعلمته اليوم
            <textarea id="learned" rows="2"></textarea>
          </label>

          <label>أولوية الغد الوحيدة
            <textarea id="tomorrowPriority" rows="2"></textarea>
          </label>

          <button type="submit" class="primary">حفظ اليوم</button>
          <p id="saveStatus" class="status"></p>
        </form>
      </section>

      <section id="notes" class="page">
        <div class="card hero">
          <h2>ملاحظة سريعة</h2>
          <p>أي فكرة تخطر ببالك وأنت خارج البيت، اكتبها هنا بسرعة.</p>
        </div>
        <form id="noteForm" class="card form">
          <label>الملاحظة
            <textarea id="quickNote" rows="5" placeholder="مثال: تذكرت أن مشكلتي ليست بالحفظ فقط، بل بالاسترجاع..."></textarea>
          </label>
          <button class="primary" type="submit">حفظ الملاحظة</button>
        </form>
        <div id="notesList" class="list"></div>
      </section>

      <section id="history" class="page">
        <div class="card hero">
          <h2>سجل الأيام</h2>
          <p>راجع الأيام السابقة وشوف نمطك مع الوقت.</p>
        </div>
        <div id="historyList" class="list"></div>
      </section>

      <section id="export" class="page">
        <div class="card hero">
          <h2>تصدير البيانات</h2>
          <p>صدّر البيانات وأرسلها لي حتى نحللها معًا.</p>
        </div>
        <div class="card actions">
          <button id="exportJson" class="primary">Export JSON</button>
          <button id="exportCsv" class="secondary">Export CSV</button>
          <button id="clearData" class="danger">مسح كل البيانات</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
